<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev PM System</title>
    <style>
        body {
            background-color: #0d1117; /* Warna gelap GitHub */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: space-between;
            padding: 10%;
            height: 100vh;
            box-sizing: border-box;
        }
        .kiri {
            max-width: 50%;
        }
        .kanan {
            background-color: #161b22;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #30363d;
            width: 350px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .hijau {
            color: #2ea043; /* Aksen hijau */
        }
        .btn-google {
            background-color: transparent;
            color: white;
            border: 1px solid #8b949e;
            padding: 10px 20px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        .btn-google:hover {
            background-color: #30363d;
        }
        .warning-box {
            background-color: rgba(46, 160, 67, 0.1);
            border: 1px solid #2ea043;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="kiri">
        <div class="login-chip">⚡ Akses Portal</div>
    <h2 class="login-title">Masuk ke Sistem</h2>
    <p class="login-sub">Gunakan akun Google yang telah didaftarkan oleh Admin.</p>

    <button class="btn-google" id="btnLogin">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Masuk dengan Google
    </button>

    <div class="divider">atau</div>

    <div class="access-note">
      <strong>Akses Terbatas</strong><br>
      Hanya akun yang telah didaftarkan oleh Admin yang dapat menggunakan sistem ini. Hubungi Admin jika belum terdaftar.
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>
</div>

</body>
</html>
